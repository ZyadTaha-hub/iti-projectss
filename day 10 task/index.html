<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Store</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>

        <nav class="navbar navbar-dark bg-dark">

            <div class="container">

            <a class="navbar-brand" href="#">Elaraby Store</a>

             <ul class="navbar-nav nav-list">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                   </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Products</a>
                    </li>
             <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                 </li>

                </ul>

            </div>

        </nav>

        <section class="hero">

            <div class="container">
              <h1>Welcome To My Store</h1>

             <p>Find the best products with great prices.</p>
                <button class="btn btn-primary">Shop Now</button>
            </div>

        </section>

    </header>

    <main>

        <section class="container products">

            <div class="row">

               <div class="col-md-3">

                <div class="card product-card">

                        <img src="images/images.jpg" class="card-img-top" alt="Laptop">
                        <div class="card-body">

                         <h5 class="card-title">Laptop</h5>
                            <p class="card-text">$20</p>
                            <button class="btn btn-success">Buy</button>

                      </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card product-card">

                    <img src="images/download (1).avif" class="card-img-top" alt="Phone">

                    <div class="card-body">
                          <h5 class="card-title">Phone</h5>
                      <p class="card-text">$66</p>

                            <button class="btn btn-success">Buy</button>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card product-card">

                     <img src="images/download.avif" class="card-img-top" alt="Headphones">

                        <div class="card-body">
                          <h5 class="card-title">Headphones</h5>

                            <p class="card-text">$350</p>
                            <button class="btn btn-success">Buy</button>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card product-card">

                      <img src="images/download (1).avif" class="card-img-top" alt="Smart Watch">

                    <div class="card-body">

                           <h5 class="card-title">Smart Watch</h5>

                           <p class="card-text">$180</p>

                           <button class="btn btn-success">Buy</button>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <footer class="bg-dark footer">

        <p>© 2026 Elaraby Store</p>

    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
